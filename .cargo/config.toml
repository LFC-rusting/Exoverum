# Alvo default do workspace: bootloader UEFI. O kernel roda em outro alvo
# (bare-metal ELF) e é construido via o alias `build-kernel` definido abaixo.
[build]
target = "x86_64-unknown-uefi"

[target.x86_64-unknown-none]
# Kernel bare-metal higher-half. Code model "small" (default) por rodar
# abaixo de 2 GiB de phys; ao migrar mais para cima, trocar para "kernel".
# no-redzone e mandatorio para handlers de interrupcao.
# target-feature=-sse evita salvar estado FP nos handlers; soft-float
# vem por padrao em x86_64-unknown-none.
# function-sections + data-sections + --gc-sections garantem que symbol
# nao-referenciado nao gere bytes no binario; reduz tamanho final em
# combinacao com lto="fat".
rustflags = [
    "-C", "panic=abort",
    "-C", "relocation-model=static",
    "-C", "no-redzone=yes",
    "-C", "target-feature=-sse",
    "-C", "link-arg=--gc-sections",
]

[target.x86_64-unknown-uefi]
# Bootloader UEFI: panic=abort + gc-sections para enxugar o .efi PE final.
rustflags = [
    "-C", "panic=abort",
    "-C", "link-arg=/OPT:REF",
    "-C", "link-arg=/OPT:ICF",
]

[alias]
# Builds de conveniencia; evita passar --target manualmente.
build-kernel = "build -p kernel --target x86_64-unknown-none"
build-kernel-release = "build -p kernel --target x86_64-unknown-none --release"
build-bootloader = "build -p bootloader"
build-bootloader-release = "build -p bootloader --release"
# Testes de host: apenas a lib do bootloader (a bin tem `#[no_main]` e so
# linka em UEFI). Kernel segue o mesmo padrao quando ganhar testes de host.
test-host = "test --lib -p bootloader -p bootinfo -p kernel --target x86_64-unknown-linux-gnu"
